# MOSAIC — Docker Compose Stack
# ============================================================
#
# Quick start:
#   docker-compose up -d
#   open http://localhost:7777
#
# Run benchmark:
#   docker-compose run --rm benchmark
#
# View logs:
#   docker-compose logs -f scheduler
#
# Stop:
#   docker-compose down
# ============================================================

version: '3.9'

services:

  # ── Core scheduler daemon ─────────────────────────────────
  scheduler:
    build: .
    container_name: mosaic-scheduler
    command: scheduler
    privileged: true            # needed for cgroups v2 + perf_event
    volumes:
      - mosaic-data:/app/data   # persist fingerprint DB, metrics, logs
      - mosaic-results:/app/results
    ports:
      - "7777:7777"             # dashboard + API
    environment:
      - MOSAIC_POWER_CAP=85
      - MOSAIC_LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7777/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - mosaic-net
    labels:
      - "com.mosaic.role=scheduler"
      - "com.mosaic.description=Core scheduling daemon + live dashboard"

  # ── Workload generator (runs once, then exits) ────────────
  workload:
    build: .
    container_name: mosaic-workload
    command: workload disaster 6 120
    depends_on:
      scheduler:
        condition: service_healthy
    volumes:
      - mosaic-data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - mosaic-net
    labels:
      - "com.mosaic.role=workload-generator"
    profiles:
      - workload               # only starts with: docker-compose --profile workload up

  # ── Benchmark runner (runs once, then exits) ──────────────
  benchmark:
    build: .
    container_name: mosaic-benchmark
    command: benchmark burst 8 90
    volumes:
      - mosaic-results:/app/results
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - mosaic-net
    labels:
      - "com.mosaic.role=benchmark"
    profiles:
      - benchmark              # only starts with: docker-compose --profile benchmark up

volumes:
  mosaic-data:
    name: mosaic-data
    labels:
      - "com.mosaic.volume=runtime-data"
  mosaic-results:
    name: mosaic-results
    labels:
      - "com.mosaic.volume=benchmark-results"

networks:
  mosaic-net:
    name: mosaic-network
    driver: bridge
