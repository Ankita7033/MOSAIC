# MOSAIC - Docker Compose Stack
#
# Quick start:
#   docker-compose up -d
#   open http://localhost:8888
#
# Send live workload (makes dashboard charts move):
#   docker exec mosaic-scheduler python workload-gen/workload_gen.py --pattern disaster --rate 4 --duration 600 --scheduler --quiet
#
# Run benchmark:
#   docker exec mosaic-scheduler python run_experiment.py --compare all --no-charts
#
# View logs:
#   docker logs mosaic-scheduler
#
# Stop:
#   docker-compose down

services:

  scheduler:
    build: .
    container_name: mosaic-scheduler
    command: scheduler
    privileged: true
    volumes:
      - mosaic-data:/app/data
      - mosaic-results:/app/results
    ports:
      - "8888:7777"
    environment:
      - MOSAIC_POWER_CAP=85
      - MOSAIC_LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7777/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - mosaic-net

  workload:
    build: .
    container_name: mosaic-workload
    command: workload disaster 4 120
    depends_on:
      scheduler:
        condition: service_healthy
    volumes:
      - mosaic-data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - mosaic-net
    profiles:
      - workload

  benchmark:
    build: .
    container_name: mosaic-benchmark
    command: benchmark burst 6 60
    volumes:
      - mosaic-results:/app/results
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - mosaic-net
    profiles:
      - benchmark

volumes:
  mosaic-data:
  mosaic-results:

networks:
  mosaic-net:
    driver: bridge
